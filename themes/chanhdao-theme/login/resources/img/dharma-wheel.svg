<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#goldGrad)" stroke-width="18"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#goldGrad)" stroke-width="14"/>
  <!-- Hub -->
  <circle cx="256" cy="256" r="32" fill="url(#goldGrad)"/>
  <!-- 8 spokes -->
  <g stroke="url(#goldGrad)" stroke-width="14" stroke-linecap="round">
    <line x1="256" y1="176" x2="256" y2="16"/>
    <line x1="256" y1="336" x2="256" y2="496"/>
    <line x1="176" y1="256" x2="16" y2="256"/>
    <line x1="336" y1="256" x2="496" y2="256"/>
    <line x1="199.4" y1="199.4" x2="86.3" y2="86.3"/>
    <line x1="312.6" y1="312.6" x2="425.7" y2="425.7"/>
    <line x1="312.6" y1="199.4" x2="425.7" y2="86.3"/>
    <line x1="199.4" y1="312.6" x2="86.3" y2="425.7"/>
  </g>
  <!-- 8 decorative crescents at spoke tips -->
  <g fill="url(#goldGrad)">
    <path d="M256 4 a14 14 0 0 1 0 28 a14 14 0 0 1 0-28Z"/>
    <path d="M256 480 a14 14 0 0 1 0 28 a14 14 0 0 1 0-28Z"/>
    <path d="M4 256 a14 14 0 0 1 0 28 a14 14 0 0 1 0-28Z" transform="translate(0,-14)"/>
    <path d="M480 256 a14 14 0 0 1 0 28 a14 14 0 0 1 0-28Z" transform="translate(0,-14)"/>
    <circle cx="80" cy="80" r="14"/>
    <circle cx="432" cy="432" r="14"/>
    <circle cx="432" cy="80" r="14"/>
    <circle cx="80" cy="432" r="14"/>
  </g>
</svg>
